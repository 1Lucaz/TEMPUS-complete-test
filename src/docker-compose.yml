services:
  app:
    build:
      context: .          # raiz do projeto (onde está o Dockerfile)
      dockerfile: Dockerfile
    container_name: fullstack_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s