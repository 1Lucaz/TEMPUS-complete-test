events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # Compressão para assets do Vite
    gzip         on;
    gzip_types   text/plain text/css application/javascript
                 application/json image/svg+xml;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;

        # ── Frontend React (SPA) ─────────────────────────────────────────────
        location / {
            root      /usr/share/nginx/html;
            index     index.html;
            try_files $uri $uri/ /index.html;   # fallback para react-router
        }

        # ── API FastAPI ──────────────────────────────────────────────────────
        # O nginx strip o prefixo /api e repassa para o uvicorn.
        # Exemplo: GET /api/users → http://127.0.0.1:8000/users
        #
        # Se suas rotas FastAPI JÁ têm o prefixo /api (ex.: /api/users),
        # troque a linha abaixo por: proxy_pass http://127.0.0.1:8000;
        location /api/ {
            proxy_pass         http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Swagger / ReDoc (opcional — remova em produção) ──────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
    }
}
